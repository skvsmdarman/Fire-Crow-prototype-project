x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  DEBUG: "false"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  MFA_ENFORCE_FOR_ADMINS: "true"
  CSRF_ENABLED: "true"
  AUTH_COOKIE_SECURE: "true"
  AUTH_COOKIE_SAMESITE: "strict"
  REPORT_LOCAL_FALLBACK: ${REPORT_LOCAL_FALLBACK:-true}
  LLM_CHAT_ASSISTANT: ${LLM_CHAT_ASSISTANT:-false}
  LLM_DASHBOARD_INSIGHT: ${LLM_DASHBOARD_INSIGHT:-false}
  LLM_ATTACK_CHAIN_NAMING: ${LLM_ATTACK_CHAIN_NAMING:-false}
  LLM_PR_DESCRIPTION: ${LLM_PR_DESCRIPTION:-false}

services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: firecrow
      POSTGRES_USER: firecrow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Must set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis - Cache, broker, session store
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Must set REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Must set REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  # API - FastAPI application (horizontally scalable)
  api:
    image: ${IMAGE_TAG:?Must set IMAGE_TAG to a pinned Fire Crow release image}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_BACKEND: "postgresql"
      PORT: "10000"
      DATABASE_URL: "postgresql://firecrow:${POSTGRES_PASSWORD}@postgres:5432/firecrow"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?Must set SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:?Must set FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:?Must set CORS_ORIGINS}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FIRE_CROW_MOCK_SANDBOX: "false"
      FIRE_CROW_SCANNER_IMAGE: ${FIRE_CROW_SCANNER_IMAGE:-ghcr.io/johan-droid/firecrow-scanner:2026-06-06}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

  # Worker - Celery background task processor (horizontally scalable)
  worker:
    image: ${IMAGE_TAG:?Must set IMAGE_TAG to a pinned Fire Crow release image}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A backend.app.workers.celery_app:celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=100
    environment:
      <<: *common-env
      DATABASE_BACKEND: "postgresql"
      DATABASE_URL: "postgresql://firecrow:${POSTGRES_PASSWORD}@postgres:5432/firecrow"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:?Must set FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:?Must set CORS_ORIGINS}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FIRE_CROW_MOCK_SANDBOX: "false"
      FIRE_CROW_SCANNER_IMAGE: ${FIRE_CROW_SCANNER_IMAGE:-ghcr.io/johan-droid/firecrow-scanner:2026-06-06}
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  # Beat - Celery periodic task scheduler (singleton)
  beat:
    image: ${IMAGE_TAG:?Must set IMAGE_TAG to a pinned Fire Crow release image}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.app.workers.celery_app:celery_app beat --loglevel=info
    environment:
      <<: *common-env
      DATABASE_BACKEND: "postgresql"
      DATABASE_URL: "postgresql://firecrow:${POSTGRES_PASSWORD}@postgres:5432/firecrow"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:?Must set FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:?Must set CORS_ORIGINS}
      FIRE_CROW_MOCK_SANDBOX: "false"
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M

  # Nginx - Load balancer / reverse proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_ssl:/etc/ssl
    depends_on:
      - api
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_ssl:
    driver: local
