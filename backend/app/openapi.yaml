openapi: 3.1.0
info:
  title: Fire Crow API
  description: Agentic Security Intelligence Platform Backend
  version: 1.0.0
paths:
  /api/v1/auth/exchange:
    post:
      tags:
      - Authentication
      summary: Exchange Token
      operationId: exchange_token_api_v1_auth_exchange_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangePayload'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/policy-context:
    get:
      tags:
      - Authentication
      summary: Policy Context
      operationId: policy_context_api_v1_auth_policy_context_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/policy-events:
    post:
      tags:
      - Authentication
      summary: Create Policy Event
      operationId: create_policy_event_api_v1_auth_policy_events_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEventRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Me
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/auth/session:
    get:
      tags:
      - Authentication
      summary: Get Session
      operationId: get_session_api_v1_auth_session_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/auth/github:
    get:
      tags:
      - Authentication
      summary: Github Login
      operationId: github_login_api_v1_auth_github_get
      parameters:
      - name: privacy_policy_accepted
        in: query
        required: true
        schema:
          type: boolean
          title: Privacy Policy Accepted
      - name: privacy_policy_version
        in: query
        required: true
        schema:
          type: string
          title: Privacy Policy Version
      - name: timezone
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Timezone
      - name: region
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/github/callback:
    get:
      tags:
      - Authentication
      summary: Github Callback
      operationId: github_callback_api_v1_auth_github_callback_get
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: true
        schema:
          type: string
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/google:
    get:
      tags:
      - Authentication
      summary: Google Login
      operationId: google_login_api_v1_auth_google_get
      parameters:
      - name: privacy_policy_accepted
        in: query
        required: true
        schema:
          type: boolean
          title: Privacy Policy Accepted
      - name: privacy_policy_version
        in: query
        required: true
        schema:
          type: string
          title: Privacy Policy Version
      - name: timezone
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Timezone
      - name: region
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/google/callback:
    get:
      tags:
      - Authentication
      summary: Google Callback
      operationId: google_callback_api_v1_auth_google_callback_get
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: true
        schema:
          type: string
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/submit:
    post:
      tags:
      - Security Auditing
      summary: Submit Audit
      description: Submit a security audit job for a remote repository. Dispatches
        Celery task or falls back to BackgroundTasks.
      operationId: submit_audit_api_v1_audit_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitJobRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/audit/jobs:
    get:
      tags:
      - Security Auditing
      summary: List Jobs
      description: Retrieve all jobs submitted by the current authenticated tenant
        (Tenant Isolation).
      operationId: list_jobs_api_v1_audit_jobs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/JobResponse'
                type: array
                title: Response List Jobs Api V1 Audit Jobs Get
      security:
      - HTTPBearer: []
  /api/v1/audit/job/{job_id}:
    get:
      tags:
      - Security Auditing
      summary: Get Job Detail
      description: Retrieve details and findings of a specific job (scoped to authenticated
        tenant).
      operationId: get_job_detail_api_v1_audit_job__job_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Security Auditing
      summary: Cancel Job
      description: Request cancellation for a running or queued job and let the runtime
        finalize cleanup.
      operationId: cancel_job_api_v1_audit_job__job_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/job/{job_id}/report:
    get:
      tags:
      - Security Auditing
      summary: Download Report
      description: Authenticated endpoint to download PDF reports.
      operationId: download_report_api_v1_audit_job__job_id__report_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/job/{job_id}/email:
    post:
      tags:
      - Security Auditing
      summary: Email Report
      description: On-demand endpoint to send/resend the PDF report to a user via
        email.
      operationId: email_report_api_v1_audit_job__job_id__email_post
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailReportRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/job/{job_id}/insight:
    get:
      tags:
      - Security Auditing
      summary: Get Job Insight
      operationId: get_job_insight_api_v1_audit_job__job_id__insight_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/job/{job_id}/graph:
    get:
      tags:
      - Security Auditing
      summary: Get Attack Graph
      operationId: get_attack_graph_api_v1_audit_job__job_id__graph_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/{job_id}/stream:
    get:
      tags:
      - Security Auditing Stream
      summary: Stream Audit Logs
      description: 'Establish a Server-Sent Events (SSE) stream for live agent log
        updates.

        Ensures tenant isolation by checking job ownership before streaming.'
      operationId: stream_audit_logs_api_v1_audit__job_id__stream_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/system/status:
    get:
      tags:
      - System
      summary: System Status
      description: Return backend readiness and tenant-scoped operational status for
        the control panel.
      operationId: system_status_api_v1_system_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/system/database/stats:
    get:
      tags:
      - System
      summary: Get Database Stats
      description: Retrieve detailed database metrics, table row counts, and storage
        metrics for admin dashboard.
      operationId: get_database_stats_api_v1_system_database_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/system/database/housekeeping:
    post:
      tags:
      - System
      summary: Trigger Database Housekeeping
      description: Manually trigger database housekeeping / storage pruning on demand.
      operationId: trigger_database_housekeeping_api_v1_system_database_housekeeping_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/storage/artifacts/{artifact_id}/download:
    get:
      tags:
      - Storage
      summary: Download Artifact
      description: Downloads an artifact from storage. Validates tenant access first.
      operationId: download_artifact_api_v1_storage_artifacts__artifact_id__download_get
      security:
      - HTTPBearer: []
      parameters:
      - name: artifact_id
        in: path
        required: true
        schema:
          type: string
          title: Artifact Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/storage/artifacts/{artifact_id}/legal-hold:
    post:
      tags:
      - Storage
      summary: Set Legal Hold
      description: Toggles legal hold for an artifact (Admin/scoped).
      operationId: set_legal_hold_api_v1_storage_artifacts__artifact_id__legal_hold_post
      security:
      - HTTPBearer: []
      parameters:
      - name: artifact_id
        in: path
        required: true
        schema:
          type: string
          title: Artifact Id
      - name: hold
        in: query
        required: true
        schema:
          type: boolean
          title: Hold
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/chat/ask:
    post:
      tags:
      - Security Chat
      summary: Ask Chat
      operationId: ask_chat_api_v1_chat_ask_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/leaderboard/:
    get:
      tags:
      - Leaderboard
      summary: Get Leaderboard
      operationId: get_leaderboard_api_v1_leaderboard__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/leaderboard:
    get:
      tags:
      - Leaderboard
      summary: Get Leaderboard
      operationId: get_leaderboard_api_v1_leaderboard_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/push/vapid-public-key:
    get:
      tags:
      - Push Notifications
      summary: Get Vapid Public Key
      operationId: get_vapid_public_key_api_v1_push_vapid_public_key_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/push/subscribe:
    post:
      tags:
      - Push Notifications
      summary: Subscribe User
      operationId: subscribe_user_api_v1_push_subscribe_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /health:
    get:
      summary: Health Check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/live:
    get:
      summary: Health Live
      operationId: health_live_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/ready:
    get:
      summary: Health Ready
      operationId: health_ready_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health/deep:
    get:
      summary: Health Deep
      operationId: health_deep_health_deep_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    ChatRequest:
      properties:
        job_id:
          type: string
          title: Job Id
        message:
          type: string
          title: Message
      type: object
      required:
      - job_id
      - message
      title: ChatRequest
    EmailReportRequest:
      properties:
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
      type: object
      title: EmailReportRequest
    ExchangePayload:
      properties:
        code:
          type: string
          title: Code
      type: object
      required:
      - code
      title: ExchangePayload
    FindingResponse:
      properties:
        id:
          type: string
          title: Id
        agent_source:
          type: string
          title: Agent Source
        title:
          type: string
          title: Title
        description:
          type: string
          title: Description
        severity:
          type: string
          title: Severity
        cvss_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Cvss Score
        cvss_vector:
          anyOf:
          - type: string
          - type: 'null'
          title: Cvss Vector
        evidence:
          anyOf:
          - type: string
          - type: 'null'
          title: Evidence
        remediation:
          anyOf:
          - type: string
          - type: 'null'
          title: Remediation
      type: object
      required:
      - id
      - agent_source
      - title
      - description
      - severity
      title: FindingResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    JobDetailResponse:
      properties:
        job:
          $ref: '#/components/schemas/JobResponse'
        findings:
          items:
            $ref: '#/components/schemas/FindingResponse'
          type: array
          title: Findings
      type: object
      required:
      - job
      - findings
      title: JobDetailResponse
    JobResponse:
      properties:
        id:
          type: string
          title: Id
        user_id:
          type: string
          title: User Id
        repo_url:
          type: string
          title: Repo Url
        repo_branch:
          type: string
          title: Repo Branch
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          title: Created At
        finished_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Finished At
        cancel_requested:
          type: boolean
          title: Cancel Requested
        cancel_requested_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Cancel Requested At
        report_pdf_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Report Pdf Url
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        security_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Security Score
        email_delivered:
          type: boolean
          title: Email Delivered
          default: false
        github_issues_raised:
          type: boolean
          title: Github Issues Raised
          default: false
        github_pr_created:
          type: boolean
          title: Github Pr Created
          default: false
      type: object
      required:
      - id
      - user_id
      - repo_url
      - repo_branch
      - status
      - created_at
      - cancel_requested
      title: JobResponse
    JobStatus:
      type: string
      enum:
      - queued
      - running
      - completed
      - failed
      - cancelled
      - partial
      title: JobStatus
    LoginRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
        privacy_policy_accepted:
          type: boolean
          title: Privacy Policy Accepted
        privacy_policy_version:
          type: string
          title: Privacy Policy Version
        timezone:
          anyOf:
          - type: string
          - type: 'null'
          title: Timezone
        region:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
      type: object
      required:
      - username
      - password
      - privacy_policy_accepted
      - privacy_policy_version
      title: LoginRequest
    PolicyEventRequest:
      properties:
        policy:
          type: string
          enum:
          - terms
          - privacy_policy
          title: Policy
        event_type:
          type: string
          enum:
          - link_click
          - page_view
          title: Event Type
        policy_version:
          type: string
          title: Policy Version
        source:
          anyOf:
          - type: string
          - type: 'null'
          title: Source
        href:
          anyOf:
          - type: string
          - type: 'null'
          title: Href
        page_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Page Path
        referrer_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Referrer Path
      type: object
      required:
      - policy
      - event_type
      - policy_version
      title: PolicyEventRequest
    RegisterRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        privacy_policy_accepted:
          type: boolean
          title: Privacy Policy Accepted
        privacy_policy_version:
          type: string
          title: Privacy Policy Version
        timezone:
          anyOf:
          - type: string
          - type: 'null'
          title: Timezone
        region:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
      type: object
      required:
      - username
      - password
      - privacy_policy_accepted
      - privacy_policy_version
      title: RegisterRequest
    SubmitJobRequest:
      properties:
        repo_url:
          type: string
          maxLength: 2048
          title: Repo Url
        repo_branch:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Repo Branch
          default: main
        attestation_accepted:
          type: boolean
          title: Attestation Accepted
          description: Confirm that you are authorized to run security audits on this
            repository.
          default: false
        authorization_scope:
          type: string
          maxLength: 255
          title: Authorization Scope
          default: authorized_representative
        custom_email:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Custom Email
      type: object
      required:
      - repo_url
      title: SubmitJobRequest
    SubscribeRequest:
      properties:
        endpoint:
          type: string
          title: Endpoint
        p256dh:
          type: string
          title: P256Dh
        auth:
          type: string
          title: Auth
      type: object
      required:
      - endpoint
      - p256dh
      - auth
      title: SubscribeRequest
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
        username:
          type: string
          title: Username
        user_id:
          type: string
          title: User Id
      type: object
      required:
      - access_token
      - token_type
      - username
      - user_id
      title: TokenResponse
    ValidationError:
      properties:
        loc:
