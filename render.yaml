services:
  - type: web
    name: firecrow-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: firecrow-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://firecrow-frontend.onrender.com"
      - key: DEBUG
        value: "false"

  - type: web
    name: firecrow-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: "https://firecrow-backend.onrender.com"

databases:
  - name: firecrow-db
    databaseName: firecrow
    user: firecrow_user
