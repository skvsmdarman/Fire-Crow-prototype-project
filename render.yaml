services:
  - type: web
    name: firecrow-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: firecrow-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://firecrow-frontend.onrender.com"
      - key: DEBUG
        value: "false"

  - type: web
    name: firecrow-frontend
    runtime: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: "https://firecrow-backend.onrender.com"

databases:
  - name: firecrow-db
    databaseName: firecrow
    user: firecrow_user
